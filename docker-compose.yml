version: "3.9"

# NOTE: The database (SQL Server) is expected to run OUTSIDE this compose file
# — e.g. a local SQLEXPRESS instance on the host. When running the API in
# Docker, set in .env:
#   MSSQL_SERVER=host.docker.internal\SQLEXPRESS   (reach the host's instance)
#   MSSQL_DRIVER=ODBC Driver 18 for SQL Server     (the image installs Driver 18)
# On Windows + SQLEXPRESS named instances, running the API locally (uvicorn)
# instead of in Docker is usually simpler — see README.

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    cap_add:
      - NET_RAW
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:8000
