# Self-contained dev stack: PostgreSQL+TimescaleDB, Redis, API, frontend,
# scheduled DB backups. For the full monitoring lab with pingable "network
# devices", use lab/docker-compose.yml instead. For production (no --reload,
# no code mounts, separate collector, nginx frontend) use docker-compose.prod.yml.
#
# Secrets come from .env at the repo root (docker compose reads it natively):
#   POSTGRES_PASSWORD=...   SECRET_KEY=...

services:
  db:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-network}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-network}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  # Daily pg_dump with rotation into ./backups on the HOST (survives volume
  # loss). Same image as `db` so pg_dump matches the server version.
  db-backup:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGHOST: db
      PGUSER: ${POSTGRES_USER:-postgres}
      PGPASSWORD: ${POSTGRES_PASSWORD:-changeme}
      PGDATABASE: ${POSTGRES_DB:-network}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
      BACKUP_KEEP: ${BACKUP_KEEP:-14}
    volumes:
      - ./backups:/backups
      - ./ops/db_backup.sh:/db_backup.sh:ro
    entrypoint: ["sh", "/db_backup.sh"]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-network}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change-this-secret}
      ENVIRONMENT: development
    ports:
      - "8000:8000"
      # Syslog receiver: devices send to <host>:514/udp; the container binds the
      # unprivileged SYSLOG_PORT (5514) so it can stay non-root.
      - "514:5514/udp"
    cap_add:
      - NET_RAW
    volumes:
      - ./backend:/app
    command: >
      sh -c "python create_db.py &&
             alembic upgrade head &&
             python seed.py &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:8000

volumes:
  pgdata:
  redisdata:
