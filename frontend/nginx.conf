# Production frontend: static Vite build + same-origin proxy to the API.
# The app uses relative URLs (/api, /ws, /tiles) everywhere, so no build-time
# API address is baked in — nginx routes them to the api service.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed build assets are immutable
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /ws/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # Offline basemap tiles served by the API
    location /tiles/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        expires 30d;
    }

    # Liveness passthrough (external watchdog can hit the frontend origin too)
    location = /healthz {
        proxy_pass http://api:8000;
    }
}
