# ── Docker monitoring lab ────────────────────────────────────────────────────
# A self-contained test environment with REAL, pingable "network devices".
# Everything runs on one Docker network so the backend can ICMP-ping the
# devices (on Windows/macOS the host itself cannot reach container IPs, so the
# prober must live on the same network — that's why the api runs here too).
#
#   Run:    cd lab && docker compose up -d --build
#   Devices: docker stop cisco-isr-baki   → watch it go UNKNOWN → OFFLINE live
#            docker start cisco-isr-baki   → back ONLINE
#   Frontend: run on the host as usual (cd frontend && npm run dev) → :5173
#
# The 4 device containers are lightweight stand-ins (Alpine) that reply to ICMP.
# Swap any of them for a real NOS image (Nokia SR Linux / Arista cEOS / FRR), or
# use `containerlab` for licensed Cisco/Juniper images — see README.md.

name: netmon-lab

networks:
  netlab:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24

services:
  # ── PostgreSQL + TimescaleDB (relational data + time-series ping history) ───
  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: network
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "Lab_Str0ng_Pass!"
    networks: [netlab]
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d network"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  # ── Scheduled DB backups (daily pg_dump + rotation → ../backups on host) ────
  db-backup:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGHOST: db
      PGUSER: postgres
      PGPASSWORD: "Lab_Str0ng_Pass!"
      PGDATABASE: network
      BACKUP_INTERVAL_SECONDS: "86400"
      BACKUP_KEEP: "14"
    networks: [netlab]
    volumes:
      - ../backups:/backups
      - ../ops/db_backup.sh:/db_backup.sh:ro
    entrypoint: ["sh", "/db_backup.sh"]

  # ── Redis: current-state cache + pub/sub bus ───────────────────────────────
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    networks: [netlab]
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s

  # ── "Network devices" — pingable + SSH-able containers (static IPs) ─────────
  # Built from ./device (Alpine + sshd + iproute2). Reply to ICMP and accept
  # SSH (root / Lab_Dev1ce!). SSH is published to the host as 2211-2214 so you
  # can `ssh root@localhost -p 2211` from WSL/Windows; inside the lab network the
  # monitor reaches them on :22 directly. All 4 share one built image.
  cisco-isr-baki:
    build: ./device
    image: netmon-lab-device
    container_name: cisco-isr-baki
    hostname: cisco-isr-baki
    environment:
      DEVICE_ROOT_PASSWORD: "Lab_Dev1ce!"
    networks:
      netlab:
        ipv4_address: 172.30.0.11
    ports:
      - "2211:22"
    cap_add:
      - NET_ADMIN          # lets `port down/up` toggle eth0 to test alerts
    restart: unless-stopped

  juniper-mx-ganja:
    build: ./device
    image: netmon-lab-device
    container_name: juniper-mx-ganja
    hostname: juniper-mx-ganja
    environment:
      DEVICE_ROOT_PASSWORD: "Lab_Dev1ce!"
    networks:
      netlab:
        ipv4_address: 172.30.0.12
    ports:
      - "2212:22"
    cap_add:
      - NET_ADMIN
    restart: unless-stopped

  cisco-cat-sumqayit:
    build: ./device
    image: netmon-lab-device
    container_name: cisco-cat-sumqayit
    hostname: cisco-cat-sumqayit
    environment:
      DEVICE_ROOT_PASSWORD: "Lab_Dev1ce!"
    networks:
      netlab:
        ipv4_address: 172.30.0.13
    ports:
      - "2213:22"
    cap_add:
      - NET_ADMIN
    restart: unless-stopped

  juniper-srx-lankaran:
    build: ./device
    image: netmon-lab-device
    container_name: juniper-srx-lankaran
    hostname: juniper-srx-lankaran
    environment:
      DEVICE_ROOT_PASSWORD: "Lab_Dev1ce!"
    networks:
      netlab:
        ipv4_address: 172.30.0.14
    ports:
      - "2214:22"
    cap_add:
      - NET_ADMIN
    restart: unless-stopped

  # ── Monitoring backend (probes the devices over ICMP) ──────────────────────
  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: network
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "Lab_Str0ng_Pass!"
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: lab-secret-change-me-0123456789abcdef
      ENVIRONMENT: production
      SIMULATION_MODE: "false"
      # Probing runs in the dedicated `collector` service below, not here.
      EMBEDDED_COLLECTOR: "false"
      DEFAULT_MANAGER_EMAIL: admin@example.com
      DEFAULT_MANAGER_PASSWORD: changeme
    networks: [netlab]
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app
    command: >
      sh -c "python create_db.py &&
             alembic upgrade head &&
             python seed.py &&
             python seed_lab_devices.py &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  # ── Collector: the SINGLE probing process (ICMP + SSH → Redis) ─────────────
  # Decoupled from the API so probing never competes with serving users. Needs
  # NET_RAW for icmplib. Waits for the API to run migrations/seed first.
  collector:
    build:
      context: ../backend
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: network
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "Lab_Str0ng_Pass!"
      REDIS_URL: redis://redis:6379/0
      # Settings validation refuses a default SECRET_KEY under production —
      # the collector never signs tokens, but shares the same Settings class.
      SECRET_KEY: lab-secret-change-me-0123456789abcdef
      ENVIRONMENT: production
      SIMULATION_MODE: "false"
      # Inside the container icmplib works (NET_RAW cap granted in the image).
      PING_METHOD: icmplib
      PING_INTERVAL_SECONDS: "30"
      PING_FAST_INTERVAL_SECONDS: "5"
      PING_COUNT: "3"
      FLAP_THRESHOLD: "2"
      # SSH telemetry collector (logs into the device containers over SSH).
      SSH_ENABLED: "true"
      SSH_POLL_INTERVAL_SECONDS: "30"
      # SNMP telemetry collector (polls the device containers' snmpd).
      SNMP_ENABLED: "true"
      SNMP_POLL_INTERVAL_SECONDS: "30"
      # Syslog receiver — device containers (or the host) can send RFC3164/5424
      # to <host>:514/udp (published below → unprivileged 5514 inside).
      SYSLOG_ENABLED: "true"
      # Auto-discovery: sweep the lab subnet; unmonitored responders (db/redis/
      # api containers) appear as pending devices — approve or ignore in the UI.
      DISCOVERY_ENABLED: "true"
      DISCOVERY_SUBNETS: "172.30.0.0/24"
      DISCOVERY_INTERVAL_SECONDS: "600"
    networks: [netlab]
    restart: unless-stopped
    ports:
      - "514:5514/udp"
    cap_add:
      - NET_RAW
    volumes:
      - ../backend:/app
    command: >
      sh -c "sleep 8 && python -m app.collector"

volumes:
  pgdata:
  redisdata:
