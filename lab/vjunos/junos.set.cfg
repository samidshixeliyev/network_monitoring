# Junos config to enable SNMP for the monitor (paste into the vJunos CLI via the
# web terminal, or apply once the VM is up). vrnetlab already enables SSH and the
# admin/admin@123 user, so only SNMP is needed for our collector.
#
#   admin@vjunos-baki> configure
#   [paste the `set` lines below]
#   admin@vjunos-baki# commit and-quit

set snmp community public authorization read-only
set snmp community public clients 172.30.0.0/24
